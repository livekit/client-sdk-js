name: Pin Check
on:
  workflow_dispatch:
  pull_request: { paths: [.github/**] }
permissions:
    contents: read
jobs:
  pin-check:
    name: Pin Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Pin Check
        uses: suzuki-shunsuke/pinact-action@cf51507d80d4d6522a07348e3d58790290eaf0b6 # v2.0.0
        with: { skip_push: true }