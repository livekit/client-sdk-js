name: Pin Check
on:
  workflow_dispatch:
  pull_request: { paths: [.github/**] }
permissions:
    contents: read
jobs:
  pin-check:
    name: Pin Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Pin Check
        uses: suzuki-shunsuke/pinact-action@cf51507d80d4d6522a07348e3d58790290eaf0b6 # v2.0.0
        with: { skip_push: true }