overrides:
  # Security: GHSA-r5fr-rjxr-66jc (code injection via _.template). lodash is a
  # transitive devDependency; pin to the patched release.
  lodash: '>=4.18.0'
minimumReleaseAge: 2880
minimumReleaseAgeExclude:
  - '@livekit/*'
  # allow webrtc-adapter 9.0.5, see https://github.com/livekit/client-sdk-js/issues/1806
  - webrtc-adapter@9.0.5
  # Renovate security update: vitest@4.1.0
  - vitest@4.1.0
